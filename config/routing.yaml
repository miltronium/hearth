# HEARTH routing policy — declarative, tuned without redeploy (ADR-005, ARCHITECTURE §3).
#
# Routing is *data, not code*. The engine (src/hearth/router/) executes this policy.
# A bad or missing file never crashes the server: HEARTH logs a warning and falls back
# to safe built-in defaults (every class local, never escalate).
#
# defaults:
#   local_model                   local model id; "auto" = registry default
#   remote                        which entry under `remotes:` escalation targets
#   remote_budget_tokens_per_day  per-UTC-day cap on remote tokens (budget accountant)
#
# classes.<name>:
#   backend    local | remote        where the class runs by default
#   escalate   never | on_low_confidence | always
#   threshold  confidence floor for on_low_confidence classes (0..1)
#
# remotes.<name>:
#   protocol   anthropic | openai    anthropic uses the official SDK; openai is generic
#   model      model id to request
#   base_url   (openai only) OpenAI-compatible endpoint, e.g. a LAN server
#   api_key_env  env var holding the API key/bearer token (secrets never live in files)
#   thinking   (anthropic only) true → send thinking={"type":"adaptive"}; default off

defaults:
  local_model: auto
  remote: default
  remote_budget_tokens_per_day: 200000

classes:
  summarize: { backend: local,  escalate: never }
  extract:   { backend: local,  escalate: never }
  classify:  { backend: local,  escalate: never }
  rank:      { backend: local,  escalate: never }
  draft:     { backend: local,  escalate: on_low_confidence, threshold: 0.6 }
  code:      { backend: local,  escalate: on_low_confidence, threshold: 0.7 }
  reason:    { backend: remote, escalate: always }
  chat:      { backend: local,  escalate: on_low_confidence, threshold: 0.65 }

remotes:
  # Default escalation target: Claude via the official `anthropic` SDK. No key lives here —
  # the SDK auto-resolves ANTHROPIC_API_KEY / the `ant auth login` profile. Set `api_key_env`
  # to name a specific env var instead. Thinking is OFF (it 400s on Opus 4.8).
  default:
    protocol: anthropic
    model: claude-opus-4-8

  # Example: a generic OpenAI-compatible endpoint (LAN server, gateway, non-Claude model).
  # Uncomment and point `defaults.remote` at it to use.
  # lan:
  #   protocol: openai
  #   model: local-llama-70b
  #   base_url: http://10.0.0.5:8000/v1
  #   api_key_env: LAN_LLM_API_KEY
