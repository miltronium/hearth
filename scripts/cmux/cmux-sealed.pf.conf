# cmux-sealed.pf.conf — REFERENCE for the pf egress seal (docs/cmux/AUDIT.md §4 #5, ADR-C006).
#
# `cmux-sealed --install-firewall` no longer loads this file directly — it GENERATES the rules with
# your real uid at install time (the earlier hardcoded `user _cmuxsealed` did not exist and failed to
# load). This file documents the shape and the important caveats.
#
# The rules the launcher loads into anchor "cmux-sealed" (with UID = your uid, or $CMUX_SEALED_UID):
#
#   pass quick on lo0 all
#   block drop out proto { tcp udp } from any to ! 127.0.0.0/8 user <UID>
#   block drop out proto { tcp udp } from any to ! ::1        user <UID>
#
# ⚠ TWO THINGS TO KNOW ON macOS:
#
# 1. ENFORCEMENT: rules loaded into a named anchor are evaluated ONLY if the main ruleset
#    (/etc/pf.conf) references the anchor with a line:  anchor "cmux-sealed"
#    Stock /etc/pf.conf does NOT. Until you add that reference (it resets on reboot), the anchor's
#    rules are DORMANT — `pfctl -a cmux-sealed -sr` will list them, but they are not enforced.
#    Therefore NEVER treat "anchor loaded" as proof. The proof is the empirical outcome:
#    scripts/cmux/cmux_egress_probe.sh must report loopback-only.
#
# 2. SCOPE: filtering by `user <UID>` blocks that whole uid's non-loopback egress — on a normal
#    single-user Mac that is your login user, i.e. your browser and other apps also lose internet
#    while the seal is loaded. That is the intended "nothing leaves during a sealed session"; remove
#    it afterwards with `cmux-sealed --remove-firewall`. To scope to cmux ALONE, run cmux under a
#    dedicated service user and set CMUX_SEALED_UID to that user's uid.
#
# RECOMMENDED ALTERNATIVE (more reliable, app-scoped, no /etc/pf.conf surgery): use LuLu (free,
# github.com/objective-see/LuLu) or Little Snitch and add a rule that blocks cmux's outbound
# connections. cmux-sealed's --check accepts a running LuLu/Little Snitch as the egress seal.
#
# Loopback is always allowed so HEARTH (127.0.0.1:8080) and local IPC keep working. The host list the
# probe should confirm never appears is in docs/cmux/AUDIT.md §5.
