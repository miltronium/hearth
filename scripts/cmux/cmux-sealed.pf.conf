# cmux-sealed.pf.conf — pf rules for the SEALED-tier egress seal (docs/cmux/AUDIT.md §4 #5, ADR-C006).
#
# The structural guarantee: a cmux running in the sealed tier can reach ONLY loopback. Because the
# in-app browser and iroh have no in-code off switch, this OS-level fence — not app flags — is what
# makes the sealed tier fail closed. Loaded into a named anchor so it never touches your global rules:
#
#   sudo pfctl -a cmux-sealed -f scripts/cmux/cmux-sealed.pf.conf && sudo pfctl -e
#   sudo pfctl -a cmux-sealed -sr        # verify the rules are loaded
#   sudo pfctl -a cmux-sealed -F all     # remove when done
#
# SCOPING (recommended): run cmux under a dedicated user so the fence targets only cmux, not the
# whole machine. Create e.g. a `_cmuxsealed` service account, launch cmux as that user, and set
# CMUX_SEALED_UID below. Without a dedicated uid these rules block ALL non-loopback egress while
# loaded — correct for a fully-offline sealed session, but broader than just cmux.
#
# Replace _cmuxsealed with your sealed uid/user. Loopback is always allowed; everything else is dropped.

# Allow all loopback traffic (HEARTH on 127.0.0.1:8080, local IPC, local sidecars).
pass quick on lo0 all

# Block every non-loopback connection originating from the sealed user (both directions of setup).
block drop out proto { tcp udp } from any to ! 127.0.0.0/8 user _cmuxsealed
block drop out proto { tcp udp } from any to ! ::1 user _cmuxsealed

# Defense-in-depth: even if not uid-scoped, deny the known cmux egress hosts' nets is impractical by
# name in pf (no DNS); rely on the loopback-only default above. See AUDIT §5 for the host list the
# dynamic probe (scripts/cmux/cmux_egress_probe.sh) should confirm never appear.
